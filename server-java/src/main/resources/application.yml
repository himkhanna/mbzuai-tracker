server:
  port: 3001

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/mbzuai_tracker}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:notifications@mbzuai.ac.ae}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: false
    check-template-location: false

app:
  jwt:
    secret: ${JWT_SECRET:mbzuai-tracker-secret-key-minimum-256-bits-long-for-hs256}
    expiration-ms: ${JWT_EXPIRES_MS:28800000}
  client-url: ${CLIENT_URL:http://localhost:5173}
  name: MBZUAI Delivery Tracker
  cron:
    enabled: ${ENABLE_CRON_JOBS:true}
    timezone: ${CRON_TIMEZONE:Asia/Dubai}
  email-ingestion:
    enabled: ${ENABLE_EMAIL_INGESTION:false}
    imap-host: ${IMAP_HOST:imap.mbzuai.ac.ae}
    imap-port: ${IMAP_PORT:993}
    imap-user: ${IMAP_USER:receiver@mbzuai.ac.ae}
    imap-pass: ${IMAP_PASS:}
    poll-interval-minutes: ${IMAP_POLL_INTERVAL:10}

logging:
  level:
    ae.mbzuai: DEBUG
    org.springframework.security: WARN
