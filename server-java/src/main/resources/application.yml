server:
  port: 3001

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/mbzuai_tracker}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:notifications@mbzuai.ac.ae}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: false
    check-template-location: false

app:
  jwt:
    secret: ${JWT_SECRET:mbzuai-tracker-secret-key-minimum-256-bits-long-for-hs256}
    expiration-ms: ${JWT_EXPIRES_MS:28800000}
  client-url: ${CLIENT_URL:http://localhost:5173}
  name: MBZUAI Delivery Tracker
  cron:
    enabled: ${ENABLE_CRON_JOBS:true}
    timezone: ${CRON_TIMEZONE:Asia/Dubai}
  email-ingestion:
    enabled: ${ENABLE_EMAIL_INGESTION:false}
    # Microsoft Graph / Azure AD app credentials
    azure-tenant-id: ${AZURE_TENANT_ID:}
    azure-client-id: ${AZURE_CLIENT_ID:}
    azure-client-secret: ${AZURE_CLIENT_SECRET:}
    # The O365 mailbox to monitor (email address)
    mailbox: ${GRAPH_MAILBOX:po-orders@mbzuai.ac.ae}
    poll-interval-ms: ${IMAP_POLL_MS:600000}   # 10 minutes
  ocr:
    enabled: ${OCR_ENABLED:true}
    # Path to Tesseract tessdata directory.
    # Windows default after installing from https://github.com/UB-Mannheim/tesseract/wiki
    # Linux/Mac: /usr/share/tesseract-ocr/4.00/tessdata
    tesseract-data-path: ${TESSERACT_DATA:C:/Program Files/Tesseract-OCR/tessdata}

logging:
  level:
    ae.mbzuai: DEBUG
    org.springframework.security: WARN
